<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0008"/>
      <stop offset="50%" style="stop-color:#2d0010"/>
      <stop offset="100%" style="stop-color:#0d0004"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:rgba(180,0,40,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bg)"/>
  <rect width="800" height="320" fill="url(#glow)"/>

  <!-- Subtle grid lines - Japanese aesthetic -->
  <line x1="0" y1="80" x2="800" y2="80" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="320" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="320" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="320" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Glow orb -->
  <circle cx="400" cy="160" r="200" fill="rgba(180,0,40,0.12)" filter="url(#blur)"/>

  <!-- Decorative circles -->
  <circle cx="400" cy="160" r="110" fill="none" stroke="rgba(220,20,60,0.15)" stroke-width="0.5"/>
  <circle cx="400" cy="160" r="80" fill="none" stroke="rgba(220,20,60,0.1)" stroke-width="0.5"/>

  <!-- Center decoration -->
  <circle cx="400" cy="160" r="48" fill="rgba(220,20,60,0.12)" stroke="rgba(220,20,60,0.3)" stroke-width="1"/>

  <!-- Sushi emojis positioned around -->
  <text x="400" y="180" font-size="52" text-anchor="middle" dominant-baseline="middle" opacity="0.9">🍣</text>

  <text x="180" y="120" font-size="30" text-anchor="middle" dominant-baseline="middle" opacity="0.6">🦐</text>
  <text x="620" y="120" font-size="30" text-anchor="middle" dominant-baseline="middle" opacity="0.6">🐟</text>
  <text x="160" y="210" font-size="26" text-anchor="middle" dominant-baseline="middle" opacity="0.5">🌀</text>
  <text x="640" y="210" font-size="26" text-anchor="middle" dominant-baseline="middle" opacity="0.5">🍤</text>
  <text x="90" y="155" font-size="22" text-anchor="middle" dominant-baseline="middle" opacity="0.35">🥢</text>
  <text x="710" y="155" font-size="22" text-anchor="middle" dominant-baseline="middle" opacity="0.35">🍱</text>

  <!-- Title text -->
  <text x="400" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="rgba(255,120,120,0.55)" text-anchor="middle" letter-spacing="6">BUFFET DE SUSHI</text>
</svg>
